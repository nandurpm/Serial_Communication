name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: serial_monitor_app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            serial_monitor_app/requirements.txt
            serial_monitor_app/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - name: Run pytest
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: serial_monitor_app/pytest.log
          if-no-files-found: error
      - name: Compile Python files
        if: always()
        run: python -m compileall -q .
